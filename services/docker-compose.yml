version: "3.9"

services:
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: gitflow-analyzer
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - PORT=5001
      - AWS_REGION=eu-west-1
      - PROJECT_NAME=gitflow-analyzer
      - ENVIRONMENT=dev
      - GIT_PYTHON_REFRESH=quiet
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  graph-builder:
    build:
      context: ./graph-builder
      dockerfile: Dockerfile
    container_name: gitflow-graph-builder
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
      - PORT=5002
      - AWS_REGION=eu-west-1
      - PROJECT_NAME=gitflow-analyzer
      - ENVIRONMENT=dev
      - GIT_PYTHON_REFRESH=quiet
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  result-api:
    build:
      context: ./result-api
      dockerfile: Dockerfile
    container_name: gitflow-result-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - ANALYZER_URL=http://analyzer:5001
      - GRAPH_BUILDER_URL=http://graph-builder:5002
      # Uses Docker service names for inter-service communication.
      # Docker Compose creates an internal network where services
      # can reach each other by their service name.
    depends_on:
      - analyzer
      - graph-builder
      # result-api waits for the other services to start first.
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitflow-frontend
    ports:
      - "8080:80"
    depends_on:
      - result-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
