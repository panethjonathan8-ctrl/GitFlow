apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitflow-analyzer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
    # This finalizer tells ArgoCD to delete all managed Kubernetes resources
    # (Deployments, Services, etc.) when this Application object is deleted.
    # Without it, deleting the Application leaves orphaned resources behind.
spec:
  project: default

  source:
    repoURL: https://github.com/panethjonathan8-ctrl/GitFlow
    targetRevision: main
    # targetRevision: main means ArgoCD always syncs from the tip of main.
    # You could also pin to a tag (e.g. v1.2.0) for tighter release control.

    path: k8s/helm/gitflow-analyzer
    # The path inside the repo where the Helm chart lives.

    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      # ArgoCD merges both files — values-dev.yaml overrides values.yaml.
      # This is the same as: helm upgrade --install ... -f values.yaml -f values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    # "kubernetes.default.svc" means the same cluster ArgoCD is running in.
    # For multi-cluster setups you would put the remote cluster's API endpoint here.
    namespace: gitflow-analyzer

  syncPolicy:
    automated:
      prune: true
      # prune: true — if you delete a resource from the Helm chart, ArgoCD
      # deletes it from the cluster too. Without this, removed resources linger.
      selfHeal: true
      # selfHeal: true — if someone runs kubectl manually and changes something,
      # ArgoCD reverts it back to what is in Git within ~3 minutes.
      # This enforces Git as the single source of truth.
    syncOptions:
      - CreateNamespace=true
      # Creates the gitflow-analyzer namespace automatically if it doesn't exist.
      # Saves you from having to run kubectl create namespace manually.
