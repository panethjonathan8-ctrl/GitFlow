# Production-environment overrides.
# Apply with: helm upgrade --install gitflow-analyzer-production . -f values.yaml -f values-production.yaml

image:
  tag: "3c362be"
  # This line is overwritten automatically by the deploy pipeline after
  # a human approves the production deployment in GitHub Actions.

analyzer:
  env:
    ENVIRONMENT: production
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

graphBuilder:
  env:
    ENVIRONMENT: production
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

resultApi:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
  database:
    host: ""
    # Set this to the RDS endpoint after terraform apply:
    # terraform -chdir=terraform/environments/dev output -raw rds_endpoint

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::153772056450:role/gitflow-analyzer-production-app-role
    # Populated after running: terraform apply (in terraform/environments/dev)
    # The production IRSA role trusts system:serviceaccount:gitflow-analyzer-production:gitflow-analyzer

hpa:
  enabled: true

pdb:
  enabled: true

networkPolicy:
  enabled: true

ingress:
  enabled: true
  # www.gitflow.space routes here — production is the only namespace with a public Ingress.
  # Dev and staging are internal only (smoke tests + kubectl port-forward).
