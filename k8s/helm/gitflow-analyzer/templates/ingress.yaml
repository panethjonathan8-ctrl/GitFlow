{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gitflow-analyzer.fullname" . }}
  labels:
    {{- include "gitflow-analyzer.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
                # All external traffic enters through the frontend nginx.
                # Nginx serves the HTML UI at / and proxies /api/* to
                # result-api:5000 internally — result-api never needs a
                # public load balancer.
      {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
{{- end }}
