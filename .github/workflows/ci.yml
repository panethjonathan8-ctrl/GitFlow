name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build analyzer
        run: docker build services/analyzer/ --tag gitflow-analyzer/analyzer:ci

      - name: Build graph-builder
        run: docker build services/graph-builder/ --tag gitflow-analyzer/graph-builder:ci

      - name: Build result-api
        run: docker build services/result-api/ --tag gitflow-analyzer/result-api:ci

