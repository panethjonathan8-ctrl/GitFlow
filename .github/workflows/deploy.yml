name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/**'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Building image with tag: $SHORT_SHA"

      - name: Build and push Docker image
        run: |
          IMAGE_SHA="${{ vars.ECR_REPO_ANALYZER }}:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REPO_ANALYZER }}:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/app/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to staging via SSM
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.STAGING_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/gitflow-analyzer","aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}","docker-compose pull","docker-compose up -d","docker ps"]' \
            --region "${{ vars.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for staging deploy
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ vars.STAGING_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Staging health check
        run: |
          sleep 15
          STAGING_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ vars.STAGING_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "Staging IP: $STAGING_IP"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$STAGING_IP:5000/health")
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i failed - retrying in 10s"
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

      - name: Record staging deployment
        if: success()
        run: |
          python3 scripts/record-deployment.py \
            "staging" \
            "${{ needs.build.outputs.image_tag }}" \
            "${{ github.sha }}" \
            "${{ github.actor }}" \
            "${{ vars.AWS_REGION }}"

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to dev via SSM
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/gitflow-analyzer","aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}","docker-compose pull","docker-compose up -d","docker ps"]' \
            --region "${{ vars.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for dev deploy
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Dev health check
        run: |
          sleep 15
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://108.131.187.89:5000/health")
            if [ "$STATUS" = "200" ]; then
              echo "Dev health check passed"
              echo "Dev URL: http://108.131.187.89:5000"
              exit 0
            fi
            echo "Attempt $i failed - retrying in 10s"
            sleep 10
          done
          echo "Dev health check failed"
          exit 1

      - name: Record dev deployment
        if: success()
        run: |
          python3 scripts/record-deployment.py \
            "dev" \
            "${{ needs.build.outputs.image_tag }}" \
            "${{ github.sha }}" \
            "${{ github.actor }}" \
            "${{ vars.AWS_REGION }}"

      - name: Print deployment summary
        if: success()
        run: |
          echo "================================"
          echo "Deployment successful"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "Dev URL: http://108.131.187.89:5000"
          echo "================================"
