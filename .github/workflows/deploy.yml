name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Building images with tag: $SHORT_SHA"

      - name: Build and push analyzer
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/analyzer:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/analyzer:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/analyzer/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

      - name: Build and push graph-builder
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/graph-builder:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/graph-builder:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/graph-builder/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

      - name: Build and push result-api
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/result-api:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/result-api:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/result-api/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

      - name: Build and push frontend
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/frontend:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/frontend:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/frontend/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to dev via SSM
        id: deploy
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
          REG: ${{ vars.ECR_REGISTRY }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"set -e\",
              \"docker stop gitflow-analyzer-app analyzer graph-builder result-api 2>/dev/null || true\",
              \"docker rm gitflow-analyzer-app analyzer graph-builder result-api 2>/dev/null || true\",
              \"docker network create gitflow-net 2>/dev/null || true\",
              \"aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REG\",
              \"docker pull $REG/gitflow-analyzer/analyzer:$TAG\",
              \"docker pull $REG/gitflow-analyzer/graph-builder:$TAG\",
              \"docker pull $REG/gitflow-analyzer/result-api:$TAG\",
              \"docker run -d --name analyzer --network gitflow-net -p 5001:5001 -e PORT=5001 -e AWS_REGION=$REGION -e PROJECT_NAME=gitflow-analyzer -e ENVIRONMENT=dev -e GIT_PYTHON_REFRESH=quiet --restart unless-stopped --log-driver json-file --log-opt max-size=10m --log-opt max-file=3 $REG/gitflow-analyzer/analyzer:$TAG\",
              \"docker run -d --name graph-builder --network gitflow-net -p 5002:5002 -e PORT=5002 -e AWS_REGION=$REGION -e PROJECT_NAME=gitflow-analyzer -e ENVIRONMENT=dev -e GIT_PYTHON_REFRESH=quiet --restart unless-stopped --log-driver json-file --log-opt max-size=10m --log-opt max-file=3 $REG/gitflow-analyzer/graph-builder:$TAG\",
              \"docker run -d --name result-api --network gitflow-net -p 5000:5000 -e PORT=5000 -e ANALYZER_URL=http://analyzer:5001 -e GRAPH_BUILDER_URL=http://graph-builder:5002 --restart unless-stopped --log-driver json-file --log-opt max-size=10m --log-opt max-file=3 $REG/gitflow-analyzer/result-api:$TAG\",
              \"docker ps\"
            ]" \
            --region "$REGION" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Wait for dev deploy
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Dev health check
        run: |
          sleep 15
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://108.131.187.89:5000/health")
            if [ "$STATUS" = "200" ]; then
              echo "Dev health check passed"
              echo "Dev URL: http://108.131.187.89:5000"
              exit 0
            fi
            echo "Attempt $i failed - retrying in 10s"
            sleep 10
          done
          echo "Dev health check failed"
          exit 1

      - name: Record dev deployment
        if: success()
        run: |
          python3 scripts/record-deployment.py \
            "dev" \
            "${{ needs.build.outputs.image_tag }}" \
            "${{ github.sha }}" \
            "${{ github.actor }}" \
            "${{ vars.AWS_REGION }}"

      - name: Print deployment summary
        if: success()
        run: |
          echo "================================"
          echo "Dev deployment successful"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "Dev URL: http://108.131.187.89:5000"
          echo "================================"

  deploy-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build, deploy-dev]
    permissions:
      id-token: write
      contents: write
      # contents: write lets this job push the updated image tag back to main.
      # Pushes made with GITHUB_TOKEN do not re-trigger GitHub Actions workflows,
      # so there is no risk of an infinite deploy loop.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Explicit token so the subsequent git push is authenticated.

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check if EKS cluster exists
        id: eks-check
        run: |
          if aws eks describe-cluster --name gitflow-analyzer-dev --region ${{ vars.AWS_REGION }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster found — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "EKS cluster not found — skipping deploy"
          fi

      - name: Configure kubectl for EKS
        if: steps.eks-check.outputs.exists == 'true'
        run: |
          aws eks update-kubeconfig \
            --name gitflow-analyzer-dev \
            --region ${{ vars.AWS_REGION }}

      - name: Bootstrap ArgoCD Application
        if: steps.eks-check.outputs.exists == 'true'
        run: scripts/bootstrap-argocd.sh
        # Registers the app with ArgoCD so it knows to watch this repo.
        # kubectl apply is idempotent — safe to run on every deploy.
        # If ArgoCD is not yet installed, the script exits cleanly.

      - name: Update image tag in values-dev.yaml
        if: steps.eks-check.outputs.exists == 'true'
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: python3 scripts/update-image-tag.py k8s/helm/gitflow-analyzer/values-dev.yaml "$TAG"

      - name: Commit and push updated image tag
        if: steps.eks-check.outputs.exists == 'true'
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: scripts/commit-image-tag.sh "$TAG"
        # ArgoCD detects this commit within ~3 minutes and rolls out the new image.
        # The pipeline does not wait for ArgoCD to finish — it fires and moves on.

      - name: Print EKS deployment summary
        if: steps.eks-check.outputs.exists == 'true'
        run: |
          echo "================================"
          echo "ArgoCD sync triggered"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "Cluster: gitflow-analyzer-dev"
          echo "Namespace: gitflow-analyzer"
          echo "ArgoCD will complete the rollout within ~3 minutes"
          echo "================================"
