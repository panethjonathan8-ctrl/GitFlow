name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Building images with tag: $SHORT_SHA"

      - name: Build and push analyzer
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/analyzer:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/analyzer:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/analyzer/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

      - name: Build and push graph-builder
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/graph-builder:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/graph-builder:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/graph-builder/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

      - name: Build and push result-api
        run: |
          IMAGE_SHA="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/result-api:${{ steps.tag.outputs.short_sha }}"
          IMAGE_LATEST="${{ vars.ECR_REGISTRY }}/gitflow-analyzer/result-api:latest"
          docker build --tag "$IMAGE_SHA" --tag "$IMAGE_LATEST" services/result-api/
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "Pushed: $IMAGE_SHA"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      id-token: write
      contents: write
      # contents: write lets this job push the updated image tag back to main.
      # Pushes made with GITHUB_TOKEN do not re-trigger GitHub Actions workflows,
      # so there is no risk of an infinite deploy loop.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── Frontend: upload to S3 + invalidate CloudFront ───────────────────
      # The frontend is a static index.html served from S3 via CloudFront.
      # No Docker build needed — just sync the file and bust the CDN cache.

      - name: Deploy frontend to S3
        run: |
          aws s3 cp services/frontend/static/index.html \
            s3://${{ vars.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "Uploaded index.html to s3://${{ vars.FRONTEND_BUCKET }}"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/gitflow-analyzer/dev/cloudfront-distribution-id" \
            --query "Parameter.Value" --output text)
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" \
            --no-cli-pager
          echo "CloudFront cache invalidated (distribution: $DIST_ID)"

      # ── Backend: update image tag, ArgoCD rolls out to EKS ───────────────

      - name: Check if EKS cluster exists
        id: eks-check
        run: |
          if aws eks describe-cluster --name gitflow-analyzer-dev --region ${{ vars.AWS_REGION }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "EKS cluster found — proceeding with deploy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "EKS cluster not found — skipping EKS deploy"
          fi

      - name: Configure kubectl for EKS
        if: steps.eks-check.outputs.exists == 'true'
        run: |
          aws eks update-kubeconfig \
            --name gitflow-analyzer-dev \
            --region ${{ vars.AWS_REGION }}

      - name: Bootstrap ArgoCD Application
        if: steps.eks-check.outputs.exists == 'true'
        run: scripts/bootstrap-argocd.sh

      - name: Update image tag in values-dev.yaml
        if: steps.eks-check.outputs.exists == 'true'
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: python3 scripts/update-image-tag.py k8s/helm/gitflow-analyzer/values-dev.yaml "$TAG"

      - name: Commit and push updated image tag
        if: steps.eks-check.outputs.exists == 'true'
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
        run: scripts/commit-image-tag.sh "$TAG"

      - name: Print deployment summary
        run: |
          echo "================================"
          echo "Frontend: https://$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Id=='${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}'].DomainName | [0]" \
            --output text)"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"
          echo "ArgoCD will complete the backend rollout within ~3 minutes"
          echo "================================"
